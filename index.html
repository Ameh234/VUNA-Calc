<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VUNA Calculator</title>
  <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/calculator.css">
</head>

<body>
  <!-- Theme Toggle Button -->
  <button class="btn btn-outline-secondary theme-toggle-btn" id="theme-toggle" onclick="toggleTheme()"
    title="Toggle dark/light mode">
    🌙
  </button>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-6 col-md-6 col-sm-8">
        <div class="border border-dotted border-3 rounded-3 p-3 mb-4 bg-white bg-opacity-50">
          <h4 class="text-center group-header mb-0">VUNA CASKET</h4>
          <p class="text-center text-small text-muted">
            <i>Created by set 2025/26 Software Engineering</i>
          </p>
        </div>

        <div class="row">
          <div class="col-md-12">
            <div class="card calculator-card">
              <div class="card-body p-4">

                <!-- TAB SWITCHER -->
                <div class="calc-tabs mb-3">
                  <button class="calc-tab active" id="tab-calc" onclick="switchTab('calc')">🧮 Calculator</button>
                  <button class="calc-tab" id="tab-cost" onclick="switchTab('cost')">🛒 Lagos Cost Estimator</button>
                </div>

                <!-- ======================== -->
                <!--   CALCULATOR PANEL       -->
                <!-- ======================== -->
                <div id="panel-calc">
                  <div class="calculator">
                    <div class="display-container">
                      <input type="text" class="form-control" id="result" placeholder="0" disabled />
                    </div>

                    <div class="btn-grid">
                      <button class="btn btn-light" onclick="bracketToResult('(')">(</button>
                      <button class="btn btn-light" onclick="bracketToResult(')')">)</button>
                      <button class="btn btn-light" onclick="backspace()">←</button>
                      <button class="btn btn-action" onclick="clearResult()">AC</button>

                      <button class="btn btn-light" onclick="appendToResult(7)">7</button>
                      <button class="btn btn-light" onclick="appendToResult(8)">8</button>
                      <button class="btn btn-light" onclick="appendToResult(9)">9</button>

                      <button class="btn btn-operator" onclick="operatorToResult('/')">÷</button>
                      <button class="btn btn-light" onclick="appendToResult(4)">4</button>
                      <button class="btn btn-light" onclick="appendToResult(5)">5</button>
                      <button class="btn btn-light" onclick="appendToResult(6)">6</button>

                      <button class="btn btn-operator" onclick="operatorToResult('*')">×</button>
                      <button class="btn btn-light" onclick="appendToResult(1)">1</button>
                      <button class="btn btn-light" onclick="appendToResult(2)">2</button>
                      <button class="btn btn-light" onclick="appendToResult(3)">3</button>

                      <button class="btn btn-operator" onclick="operatorToResult('+')">+</button>
                      <button class="btn btn-light" onclick="appendToResult('.')">.</button>
                      <button class="btn btn-light" onclick="appendToResult(0)">0</button>
                      <button class="btn btn-operator" onclick="percentToResult('%')">%</button>

                      <button class="btn btn-operator" onclick="operatorToResult('-')">−</button>
                      <button class="btn btn-equals" onclick="calculateResult()" style="grid-column: span 4;">=</button>
                    </div>
                  </div>
                </div>

                <!-- ======================== -->
                <!--   LAGOS COST ESTIMATOR   -->
                <!-- ======================== -->
                <div id="panel-cost" style="display:none;">
                  <div class="cost-estimator">

                    <!-- Rate display -->
                    <div class="rate-banner" id="rate-banner">
                      <span id="rate-text">⏳ Fetching live USD/NGN rate...</span>
                      <button class="rate-refresh" onclick="fetchRate()" title="Refresh rate">🔄</button>
                    </div>

                    <!-- Items list -->
                    <div class="items-list" id="items-list">
                      <div class="items-header">
                        <span>Item</span>
                        <span>Unit Price (₦)</span>
                        <span>Qty</span>
                        <span>Total</span>
                        <span></span>
                      </div>
                      <!-- rows injected here -->
                    </div>

                    <!-- Add item form -->
                    <div class="add-item-form">
                      <input type="text" id="item-name" placeholder="Item name (e.g. Rice)" class="cost-input" />
                      <input type="number" id="item-price" placeholder="Unit price ₦" class="cost-input" min="0" />
                      <input type="number" id="item-qty" placeholder="Qty" class="cost-input qty-input" min="1" value="1" />
                      <button class="btn-add-item" onclick="addItem()">+ Add</button>
                    </div>

                    <!-- Summary -->
                    <div class="cost-summary">
                      <div class="summary-row">
                        <span>Total (₦)</span>
                        <strong id="total-ngn">₦0.00</strong>
                      </div>
                      <div class="summary-row usd-row">
                        <span>Equivalent (USD)</span>
                        <strong id="total-usd">$—</strong>
                      </div>
                      <div class="summary-actions">
                        <button class="btn-use-total" onclick="useTotal()">⬆ Send Total to Calculator</button>
                        <button class="btn-clear-items" onclick="clearItems()">🗑 Clear All</button>
                      </div>
                    </div>

                  </div>
                </div>
                <!-- end panels -->

              </div>
            </div>
          </div>

          <script src="assets/js/bootstrap.min.js"></script>
          <script src="assets/js/script.js"></script>
          <button id="scroll-to-calculator" title="Back to Calculator">↑</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
