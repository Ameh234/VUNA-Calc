name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to CyberPanel (ameh.vudse26.cloud)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Upload files via CyberPanel API
        env:
          CPANEL_URL: https://panel.vudse26.cloud:8090
          CPANEL_USER: ameh
          CPANEL_PASS: ${{ secrets.CPANEL_PASSWORD }}
          WEBROOT: /home/ameh.vudse26.cloud/public_html
        run: |
          for file in index.html assets/css/calculator.css assets/css/styles.css assets/js/script.js; do
            echo "Uploading $file..."
            curl -s -X POST "$CPANEL_URL/api/filemanager/upload" \
              -u "$CPANEL_USER:$CPANEL_PASS" \
              -F "dir=$WEBROOT/$(dirname $file)" \
              -F "file=@$file" \
              -k
          done
          echo "All files uploaded!"

      - name: Verify deployment
        run: |
          echo "## Deployment Complete 🚀" >> $GITHUB_STEP_SUMMARY
          echo "| Site | https://ameh.vudse26.cloud |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Time | $(date -u) |" >> $GITHUB_STEP_SUMMARY