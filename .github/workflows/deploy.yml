name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to CyberPanel (ameh.vudse26.cloud)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 159.198.47.177
          username: ameh
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            set -e
            WEBROOT="/home/ameh.vudse26.cloud/public_html"
            REPO="https://github.com/Ameh234/VUNA-Calc.git"
            TMPDIR="/tmp/vuna_tmp"

            # Fix ownership of public_html
            chmod 755 $WEBROOT

            if [ -d "$WEBROOT/.git" ]; then
              cd $WEBROOT && git pull origin main
            else
              rm -rf $TMPDIR
              git clone $REPO $TMPDIR
              cp -r $TMPDIR/. $WEBROOT/
              rm -rf $TMPDIR
            fi

            echo "Deploy done!"