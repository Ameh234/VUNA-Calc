name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to CyberPanel (ameh.vudse26.cloud)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Deploy via SSH to CyberPanel
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 159.198.47.177
          username: ameh
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            rm -rf /home/ameh.vudse26.cloud/public_html/*
            mkdir -p /home/ameh.vudse26.cloud/public_html

      - name: Copy files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 159.198.47.177
          username: ameh
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          source: "./*"
          target: /home/ameh.vudse26.cloud/public_html/
          rm: false

      - name: Verify deployment
        run: |
          echo "## Deployment Complete 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Site | https://ameh.vudse26.cloud |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Time | $(date -u) |" >> $GITHUB_STEP_SUMMARY